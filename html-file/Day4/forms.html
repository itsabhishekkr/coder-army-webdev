<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Registration Form</title>
</head>
<body>
    <h1>University Registration Form</h1>
    <p>Please fill out the form below to register for the university.</p>
    <hr>
    <h2>Personal Information</h2>
    <form>
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName"  placeholder="first name" required><br><br>
        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName"  placeholder="last name" required><br><br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob"  required><br><br>

        <label for="gender">Gender:</label>
        <br>
       
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <br>
        
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br>
        
        <input type="radio" id="other" name ="gender" value="other">
        <label for="other">Other</label>
        <br><br>

        <label for="fileUpload">Upload your photo:</label><br>
        <input type="file" id="fileUpload" name="fileUpload" required><br><br>

        <hr>
        <h2>Contact Information</h2>
        <label for="email"></label>
        <input type="email" id="email" name="email" placeholder="email" required><br><br>
        <label for="phone"></label>
        <input type="tel" id="phone" name="phone" placeholder="phone number" required><br><br>

        <label for="address"></label>
        <input type="text" id="address" name="address" placeholder="address" required><br><br>

        <hr>

        <h2>Academic Information</h2>
        <label for="courses">Select your Courses:</label>
        <select id="courses" name="courses" required>
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="javascript">JavaScript</option>
            <option value="c++">C++</option>

        
        </select><br><br>

        <label for="extra">Extra Curricular Activities:</label>

        <input type="checkbox" id="sports" name="extra" value="sports">
        <label for="sports">Sports</label>
        <input type="checkbox" id="music" name="extra" value="music">
        <label for="music">Music</label>
        <input type="checkbox" id="arts" name="extra" value="arts">
        <label for="arts">Arts</label><br><br>

        <h2>Create your account</h2>

        <label for="cpassward"></label>
        <input type="password" id="cpassward" name="cpassward" placeholder="create password" required><br><br>

        <label for="security">Security Question:</label>
        <select id="security" name="security" required>
            <option value="pet">What is your pet's name?</option>
            <option value="school">What is the name of your first school?</option>
            <option value="city">In which city were you born?</option>

        </select><br><br>

        <label for="sanswer">Security Answer:</label>
        <input type="text" id="sanswer" name="sanswer" placeholder="security answer" required><br><br>

        <input type="checkbox" id="termandcondition" name="termandcondition" value="i agree">
        <label for="termandcondition">I agree to the terms and conditions</label><br><br>

        <button type="submit">Submit</button>

    </form>
</body>
</html>
